name: Build and Deploy to GitHub Pages

# Builds the game into a Pages artifact and publishes it to GitHub Pages.
# The game is static (HTML + vendored Phaser + procedurally generated assets),
# so the "build" step assembles the files that make up the site; no bundler or
# compiler is required.

on:
  push:
    # `main` is the deploy branch for Pages: only pushes to main publish to the
    # live site, so main is always the single source of truth for what's live.
    # Iterate on a feature branch, then merge (or fast-forward) into main to
    # ship. Pages has one live site, and gating on main keeps branches from
    # clobbering each other.
    branches:
      - main
  # Allow running the deploy manually from the Actions tab. An optional note
  # lets you describe what changed for this deploy; it lands in version.json.
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note describing what changed (defaults to the latest commit message)"
        required: false
        default: ""

# Grant the token the permissions Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only ever run one deployment at a time; cancel superseded runs in-progress
# would interrupt a live deploy, so let running deploys finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        # Copy only the files the game needs into the publish directory.
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r src _site/
          cp -r vendor _site/

      - name: Stamp deploy version
        # Write a tiny version.json into the site so you can confirm the live
        # site is serving your latest push (not a stale CDN copy) and see, at a
        # glance, what changed. Check it at
        # https://darkcascade.github.io/fantasia/version.json after a deploy.
        # `note` is the manual workflow_dispatch input when given, otherwise the
        # latest commit's subject line. jq builds the JSON so any quotes in the
        # commit message are escaped safely.
        env:
          MANUAL_NOTE: ${{ github.event.inputs.note }}
        run: |
          NOTE="${MANUAL_NOTE:-$(git log -1 --pretty=%s)}"
          jq -n \
            --arg commit "${GITHUB_SHA}" \
            --arg shortCommit "$(echo "${GITHUB_SHA}" | cut -c1-7)" \
            --arg branch "${GITHUB_REF_NAME}" \
            --arg deployedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg runNumber "${GITHUB_RUN_NUMBER}" \
            --arg note "$NOTE" \
            '{commit: $commit, shortCommit: $shortCommit, branch: $branch, deployedAt: $deployedAt, runNumber: $runNumber, note: $note}' \
            > _site/version.json
          echo "Stamped version:"
          cat _site/version.json

      - name: Verify required files exist
        run: |
          test -f _site/index.html
          test -f _site/src/game.js
          test -f _site/vendor/phaser.min.js
          test -f _site/version.json
          echo "Site assembled:"
          find _site -type f | sort

      - name: Setup Pages
        # NOTE: Pages must be enabled once, manually, before this succeeds:
        #   Settings → Pages → Build and deployment → Source: "GitHub Actions".
        # The workflow token cannot create the Pages site on its own.
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish live link to run summary
        env:
          MANUAL_NOTE: ${{ github.event.inputs.note }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          URL="${{ steps.deployment.outputs.page_url }}"
          # This job has no checkout, so derive the note from the event context:
          # the manual input if given, else the head commit's first line.
          NOTE="${MANUAL_NOTE:-$(printf '%s' "$COMMIT_MSG" | head -n1)}"
          [ -n "$NOTE" ] || NOTE="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "## 🎮 Deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The game is live at: [${URL}](${URL})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deployed commit: \`$(echo "${GITHUB_SHA}" | cut -c1-7)\` from branch \`${GITHUB_REF_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- What changed: ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Confirm the live version: [${URL}version.json](${URL}version.json)" >> "$GITHUB_STEP_SUMMARY"
