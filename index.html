<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#140f33" />
  <title>Fantasia</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1d232a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      touch-action: manipulation;
    }

    #game-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Phaser injects its canvas here; keep it crisp and centered. */
    #game-container canvas {
      display: block;
      touch-action: none;
    }

    /* ----------------------------------------------------------------- */
    /*  Fantasia game-selector menu (the first screen on load).          */
    /* ----------------------------------------------------------------- */

    #menu-screen {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(24px, 6vh, 48px);
      padding: 6vh 5vw;
      text-align: center;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 18%, rgba(126, 116, 224, 0.38), transparent 60%),
        radial-gradient(ellipse at 50% 120%, rgba(15, 8, 32, 0.95), transparent 70%),
        linear-gradient(180deg, #1b1440 0%, #0d0a24 55%, #05030f 100%);
    }

    /* A sparse dusting of stars for the "Fantasia" night-sky feel. */
    #menu-screen::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.6;
      background-image:
        radial-gradient(1.6px 1.6px at 25% 15%, #fff, transparent),
        radial-gradient(1px 1px at 70% 22%, #fff, transparent),
        radial-gradient(1.6px 1.6px at 40% 58%, #fff, transparent),
        radial-gradient(1px 1px at 85% 68%, #fff, transparent),
        radial-gradient(1px 1px at 14% 78%, #fff, transparent),
        radial-gradient(1.6px 1.6px at 60% 86%, #fff, transparent),
        radial-gradient(1px 1px at 90% 42%, #fff, transparent),
        radial-gradient(1px 1px at 50% 34%, #fff, transparent),
        radial-gradient(1.4px 1.4px at 8% 40%, #fff, transparent),
        radial-gradient(1px 1px at 33% 88%, #fff, transparent);
    }

    .menu-inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(20px, 5vh, 40px);
    }

    /* The title: a rich, rounded 1970s-Disney-style serif in warm gold. */
    .menu-title {
      font-family: "Cooper Black", "Bookman Old Style", "Palatino Linotype",
        Palatino, Georgia, "Times New Roman", serif;
      font-weight: 700;
      font-size: clamp(58px, 19vw, 132px);
      line-height: 0.95;
      letter-spacing: 0.015em;
      background: linear-gradient(180deg, #fff6d5 0%, #f6d879 34%, #e2a72f 68%, #a5610f 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      filter:
        drop-shadow(0 2px 0 rgba(74, 38, 0, 0.55))
        drop-shadow(0 10px 22px rgba(0, 0, 0, 0.6));
    }

    .menu-tagline {
      margin-top: clamp(6px, 1.4vh, 14px);
      font-family: "Palatino Linotype", Palatino, Georgia, serif;
      font-style: italic;
      font-size: clamp(15px, 4.5vw, 22px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #d8cdff;
      opacity: 0.85;
    }

    .menu-buttons {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: clamp(14px, 2.6vh, 20px);
      width: min(360px, 84vw);
    }

    .menu-btn {
      font-family: "Cooper Black", "Bookman Old Style", Georgia, serif;
      font-size: clamp(20px, 5.6vw, 27px);
      padding: 16px 22px;
      border-radius: 15px;
      cursor: pointer;
      transition: transform 0.06s ease, box-shadow 0.06s ease;
    }

    .menu-btn--primary {
      color: #3a2500;
      border: 2px solid #ffe9ad;
      background: linear-gradient(180deg, #ffe7a3 0%, #f0b94a 100%);
      box-shadow: 0 6px 0 #8a5a12, 0 12px 22px rgba(0, 0, 0, 0.45);
    }

    .menu-btn--primary:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #8a5a12, 0 6px 14px rgba(0, 0, 0, 0.4);
    }

    .menu-btn--secondary {
      color: #ffe7a3;
      border: 2px solid rgba(255, 224, 138, 0.7);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.35), 0 12px 22px rgba(0, 0, 0, 0.35);
    }

    .menu-btn--secondary:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.35), 0 6px 14px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <!-- Phaser mounts the selected game's canvas here once it's launched. -->
  <div id="game-container"></div>

  <!-- Default screen: the Fantasia game selector. -->
  <div id="menu-screen">
    <div class="menu-inner">
      <div>
        <h1 class="menu-title">Fantasia</h1>
        <p class="menu-tagline">Select your adventure</p>
      </div>
      <div class="menu-buttons">
        <button id="btn-flappy" class="menu-btn menu-btn--primary" type="button">
          Flappy Bird
        </button>
        <button id="btn-avians" class="menu-btn menu-btn--secondary" type="button">
          Annoyed Avians
        </button>
        <button id="btn-starcatcher" class="menu-btn menu-btn--secondary" type="button">
          Star Catcher
        </button>
        <!-- DEV-ONLY prototype toggle — not part of any production build. -->
        <label id="boom-toggle" style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:2px;color:#ffe7a3;font-family:sans-serif;font-size:14px;cursor:pointer;">
          <input type="checkbox" id="chk-boom" /> Boom mode?
        </label>
      </div>
    </div>
  </div>

  <!-- Phaser 4, vendored locally so the games are fully self-contained and work offline. -->
  <script src="vendor/phaser.min.js"></script>
  <script src="src/game.js"></script>
  <script src="src/annoyed-avians.js"></script>
  <script src="src/star-catcher.js"></script>
  <script>
    // Wire up the Fantasia selector. Each game's Phaser instance is created on
    // demand when its button is pressed, so the menu is always shown first.
    (function () {
      var menu = document.getElementById("menu-screen");

      function hideMenu() {
        menu.style.display = "none";
      }

      document.getElementById("btn-flappy").addEventListener("click", function () {
        hideMenu();
        if (typeof window.launchFlappyBird === "function") window.launchFlappyBird();
      });

      document.getElementById("btn-avians").addEventListener("click", function () {
        hideMenu();
        var boom = document.getElementById("chk-boom").checked; // dev-only prototype
        if (typeof window.launchAnnoyedAvians === "function") window.launchAnnoyedAvians({ boom: boom });
      });

      document.getElementById("btn-starcatcher").addEventListener("click", function () {
        hideMenu();
        if (typeof window.launchStarCatcher === "function") window.launchStarCatcher();
      });

      // Return to the Fantasia menu from within a game: show the menu and tear
      // down whichever Phaser game is running (next tick, to avoid destroying
      // mid-callback).
      window.returnToMenu = function () {
        menu.style.display = "flex";
        setTimeout(function () {
          if (window.game) { try { window.game.destroy(true); } catch (e) {} window.game = null; }
          if (window.aviansGame) { try { window.aviansGame.destroy(true); } catch (e) {} window.aviansGame = null; }
          if (window.starCatcherGame) { try { window.starCatcherGame.destroy(true); } catch (e) {} window.starCatcherGame = null; }
        }, 0);
      };
    })();
  </script>
</body>
</html>
