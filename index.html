<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#4ec0ca" />
  <title>Flappy Bird — Phaser Clone</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1d232a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      touch-action: manipulation;
    }

    #game-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Phaser injects its canvas here; keep it crisp and centered. */
    #game-container canvas {
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- Phaser 4, vendored locally so the game is fully self-contained and works offline. -->
  <script src="vendor/phaser.min.js"></script>
  <script src="src/game.js"></script>
</body>
</html>
